<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EDEKA Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-link {
            color: #888;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .back-link:hover {
            color: #fff;
            border-color: #555;
            background: #1a1a1a;
        }

        select {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .info-bar {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        /* Time range & category filters */
        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .filters-bar .label {
            color: #888;
            font-size: 0.85rem;
            margin-right: 4px;
        }

        .filter-btn {
            background: #1a1a1a;
            color: #aaa;
            border: 1px solid #333;
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .filter-btn:hover {
            background: #2a2a2a;
            color: #fff;
        }

        .filter-btn.active {
            background: #1a472a;
            border-color: #2d7a4a;
            color: #fff;
        }

        .filter-separator {
            width: 1px;
            height: 24px;
            background: #333;
            margin: 0 6px;
        }

        .cat-btn {
            background: #1a1a1a;
            color: #aaa;
            border: 1px solid #333;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .cat-btn:hover {
            opacity: 0.9;
        }

        .cat-btn.active {
            color: #fff;
            border-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto;
            gap: 20px;
        }

        .panel {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            min-height: 400px;
        }

        .panel-full {
            grid-column: 1 / -1;
            min-height: 550px;
        }

        .panel h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 16px;
        }

        .chart-container {
            width: 100%;
            height: 380px;
        }

        .chart-container-large {
            width: 100%;
            height: 500px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: #555;
            font-size: 1.1rem;
        }

        /* Ctrl-to-zoom overlay */
        .zoom-hint-wrapper {
            position: relative;
        }

        .zoom-hint {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 1rem;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 12px;
        }

        .zoom-hint.visible {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>EDEKA Dashboard</h1>
        <div class="header-controls">
            <select id="week-select"></select>
            <a href="index.html" class="back-link">&#8592; Startseite</a>
        </div>
    </div>
    <div id="info-bar" class="info-bar">Lade Daten...</div>

    <div id="filters-bar" class="filters-bar"></div>

    <div class="grid">
        <div class="panel panel-full">
            <h2>Produkt-Netzwerk</h2>
            <div class="zoom-hint-wrapper">
                <div id="network-zoom-hint" class="zoom-hint">Ctrl + Scrollen zum Zoomen</div>
                <div id="chart-network" class="chart-container-large"></div>
            </div>
        </div>

        <div class="panel">
            <h2>Kategorien &mdash; Treemap</h2>
            <div id="chart-treemap" class="chart-container"></div>
        </div>

        <div class="panel">
            <h2>Preisverteilung pro Kategorie</h2>
            <div id="chart-prices" class="chart-container"></div>
        </div>

        <div class="panel panel-full">
            <h2>Wochen-Trend &mdash; Produkte pro Kategorie</h2>
            <div id="chart-trend" class="chart-container-large"></div>
        </div>
    </div>

    <script>
        const CATEGORY_COLORS = {
            'Drogerie': '#ab47bc',
            'Fleisch & Wurst': '#ef5350',
            'Getränke': '#42a5f5',
            'Grundnahrung': '#ffa726',
            'Knabbern & Naschen': '#ec407a',
            'Molkerei & Käse': '#ffee58',
            'Obst & Gemüse': '#66bb6a',
            'Tiefkühl': '#26c6da',
            'Tiernahrung': '#8d6e63',
        };

        const TIME_RANGES = [
            { label: '3 Monate', weeks: 13 },
            { label: '6 Monate', weeks: 26 },
            { label: '1 Jahr', weeks: 52 },
            { label: 'Gesamt', weeks: Infinity },
        ];

        let allFiles = [];
        let allTrendData = [];       // all weeks, chronological
        let allTrendCategories = [];
        let activeTimeRange = 2;     // default: 1 Jahr
        let activeCategories = new Set();
        let trendChart = null;
        let charts = {};             // track all chart instances for proper disposal
        let currentOffers = [];      // current week's offers for re-filtering

        async function init() {
            const weekSelect = document.getElementById('week-select');

            const files = await fetchJSON('data/folder-structure.json');
            files.reverse();
            allFiles = files;

            files.forEach(file => {
                const opt = document.createElement('option');
                opt.value = file;
                const m = file.match(/(\d{4})\/(KW\d+)\/(\d{4})-(\d{2})-(\d{2})\.json/);
                opt.textContent = m ? `${m[2]} — ${m[5]}.${m[4]}.${m[1]}` : file;
                weekSelect.appendChild(opt);
            });

            weekSelect.addEventListener('change', () => loadWeek(weekSelect.value));

            if (files.length > 0) {
                await loadWeek(files[0]);
            }

            await loadAllTrendData(files);
            buildFiltersBar();
            renderTrend();
            setupNetworkZoomGuard();
        }

        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
            return res.json();
        }

        async function loadWeek(filePath) {
            const data = await fetchJSON(`data/${filePath}`);
            const { offers, totalCount, validFrom, validTill } = data;
            currentOffers = offers;

            document.getElementById('info-bar').textContent =
                `${totalCount} Angebote vom ${formatDate(validFrom)} bis ${formatDate(validTill)}`;

            renderFilteredWeekCharts();
        }

        function renderFilteredWeekCharts() {
            const filtered = currentOffers.filter(o => activeCategories.has(o.category.name));
            renderNetwork(filtered);
            renderTreemap(filtered);
            renderPriceChart(filtered);
        }

        function formatDate(d) {
            const p = d.split('-');
            return p.length === 3 ? `${p[2]}.${p[1]}.${p[0]}` : d;
        }

        // ── Load ALL trend data ──────────────────────────────────
        async function loadAllTrendData(files) {
            const trendContainer = document.getElementById('chart-trend');
            trendContainer.innerHTML = '<div class="loading">Lade historische Daten...</div>';

            const catSet = new Set();
            const weeklyData = [];

            for (const file of files) {
                try {
                    const data = await fetchJSON(`data/${file}`);
                    const m = file.match(/(KW\d+)/);
                    const weekLabel = m ? m[1] : file;

                    const catCounts = {};
                    data.offers.forEach(o => {
                        const cat = o.category.name;
                        catSet.add(cat);
                        catCounts[cat] = (catCounts[cat] || 0) + 1;
                    });

                    weeklyData.push({ week: weekLabel, counts: catCounts, total: data.totalCount });
                } catch (e) {
                    console.warn(`Skipping ${file}:`, e);
                }
            }

            weeklyData.reverse();
            allTrendData = weeklyData;
            allTrendCategories = [...catSet].sort();
            activeCategories = new Set(allTrendCategories.filter(c => !HIDDEN_CATEGORIES_DEFAULT.includes(c)));
        }

        // ── Filters bar ──────────────────────────────────────────
        function buildFiltersBar() {
            const bar = document.getElementById('filters-bar');
            bar.innerHTML = '';

            // Time range buttons
            const timeLabel = document.createElement('span');
            timeLabel.className = 'label';
            timeLabel.textContent = 'Zeitraum:';
            bar.appendChild(timeLabel);

            TIME_RANGES.forEach((range, i) => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (i === activeTimeRange ? ' active' : '');
                btn.textContent = range.label;
                btn.addEventListener('click', () => {
                    activeTimeRange = i;
                    updateFilterButtons();
                    renderTrend();
                });
                btn.dataset.timeIdx = i;
                bar.appendChild(btn);
            });

            // Separator
            const sep = document.createElement('div');
            sep.className = 'filter-separator';
            bar.appendChild(sep);

            // Category buttons
            const catLabel = document.createElement('span');
            catLabel.className = 'label';
            catLabel.textContent = 'Kategorien:';
            bar.appendChild(catLabel);

            allTrendCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn' + (activeCategories.has(cat) ? ' active' : '');
                btn.textContent = cat;
                const color = CATEGORY_COLORS[cat] || '#888';
                if (activeCategories.has(cat)) {
                    btn.style.background = color;
                    btn.style.borderColor = 'transparent';
                }
                btn.addEventListener('click', () => {
                    if (activeCategories.has(cat)) {
                        activeCategories.delete(cat);
                    } else {
                        activeCategories.add(cat);
                    }
                    updateCategoryButtons();
                    renderFilteredWeekCharts();
                    renderTrend();
                });
                btn.dataset.cat = cat;
                bar.appendChild(btn);
            });
        }

        function updateFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', +btn.dataset.timeIdx === activeTimeRange);
            });
        }

        function updateCategoryButtons() {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                const cat = btn.dataset.cat;
                const isActive = activeCategories.has(cat);
                btn.classList.toggle('active', isActive);
                const color = CATEGORY_COLORS[cat] || '#888';
                btn.style.background = isActive ? color : '#1a1a1a';
                btn.style.borderColor = isActive ? 'transparent' : '#333';
                btn.style.color = isActive ? '#fff' : '#aaa';
            });
        }

        // ── Network Graph ──────────────────────────────────────
        function renderNetwork(offers) {
            if (charts.network) charts.network.dispose();
            const chart = echarts.init(document.getElementById('chart-network'), 'dark');
            charts.network = chart;

            const categories = [...new Set(offers.map(o => o.category.name))];

            const categoryNodes = categories.map(cat => ({
                id: `cat_${cat}`,
                name: cat,
                symbolSize: 50,
                category: categories.indexOf(cat),
                itemStyle: {
                    color: CATEGORY_COLORS[cat] || '#888',
                    borderColor: '#fff',
                    borderWidth: 2,
                },
                label: {
                    show: true,
                    fontSize: 13,
                    fontWeight: 'bold',
                    color: '#fff',
                },
            }));

            const productNodes = offers.map(o => {
                const price = parseFloat(o.price.rawValue) || parseFloat(o.price.value) || 1;
                return {
                    id: `p_${o.id}`,
                    name: o.title,
                    symbolSize: Math.max(8, Math.min(30, price * 3)),
                    category: categories.indexOf(o.category.name),
                    value: price,
                    itemStyle: {
                        color: CATEGORY_COLORS[o.category.name] || '#888',
                        opacity: 0.85,
                    },
                    label: { show: false },
                };
            });

            const links = offers.map(o => ({
                source: `p_${o.id}`,
                target: `cat_${o.category.name}`,
                lineStyle: {
                    color: CATEGORY_COLORS[o.category.name] || '#888',
                    opacity: 0.15,
                    width: 1,
                },
            }));

            chart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    formatter: (params) => {
                        if (params.dataType === 'node') {
                            if (params.data.id.startsWith('cat_')) {
                                const count = offers.filter(o => o.category.name === params.data.name).length;
                                return `<b>${params.data.name}</b><br/>${count} Produkte`;
                            }
                            return `<b>${params.data.name}</b><br/>${params.data.value.toFixed(2)} €`;
                        }
                        return '';
                    },
                },
                legend: {
                    data: categories,
                    textStyle: { color: '#aaa' },
                    bottom: 10,
                    type: 'scroll',
                },
                series: [{
                    type: 'graph',
                    layout: 'force',
                    roam: 'move',
                    draggable: true,
                    categories: categories.map(cat => ({
                        name: cat,
                        itemStyle: { color: CATEGORY_COLORS[cat] || '#888' },
                    })),
                    nodes: [...categoryNodes, ...productNodes],
                    links: links,
                    force: {
                        repulsion: 120,
                        gravity: 0.1,
                        edgeLength: [40, 120],
                        friction: 0.6,
                    },
                    emphasis: {
                        focus: 'adjacency',
                        lineStyle: { opacity: 0.6, width: 2 },
                    },
                    animation: true,
                    animationDuration: 1500,
                }],
            });

            window.addEventListener('resize', () => chart.resize());
        }

        // ── Treemap ────────────────────────────────────────────
        function renderTreemap(offers) {
            if (charts.treemap) charts.treemap.dispose();
            const chart = echarts.init(document.getElementById('chart-treemap'), 'dark');
            charts.treemap = chart;

            const catData = {};
            offers.forEach(o => {
                const cat = o.category.name;
                if (!catData[cat]) catData[cat] = { count: 0, totalPrice: 0 };
                catData[cat].count++;
                catData[cat].totalPrice += parseFloat(o.price.rawValue) || parseFloat(o.price.value) || 0;
            });

            const treeData = Object.entries(catData).map(([name, d]) => ({
                name: `${name}\n${d.count} Produkte`,
                value: d.count,
                itemStyle: { color: CATEGORY_COLORS[name] || '#888' },
                avgPrice: (d.totalPrice / d.count).toFixed(2),
            }));

            chart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    formatter: (p) =>
                        `<b>${p.name.split('\n')[0]}</b><br/>` +
                        `${p.value} Produkte<br/>` +
                        `Ø Preis: ${p.data.avgPrice} €`,
                },
                series: [{
                    type: 'treemap',
                    roam: false,
                    nodeClick: false,
                    breadcrumb: { show: false },
                    label: {
                        show: true,
                        fontSize: 14,
                        fontWeight: 'bold',
                        color: '#fff',
                        formatter: '{b}',
                    },
                    itemStyle: {
                        borderColor: '#0a0a0a',
                        borderWidth: 3,
                        gapWidth: 3,
                    },
                    data: treeData,
                }],
            });

            window.addEventListener('resize', () => chart.resize());
        }

        // ── Price Distribution ─────────────────────────────────
        function renderPriceChart(offers) {
            if (charts.prices) charts.prices.dispose();
            const chart = echarts.init(document.getElementById('chart-prices'), 'dark');
            charts.prices = chart;

            const catPrices = {};
            offers.forEach(o => {
                const cat = o.category.name;
                const price = parseFloat(o.price.rawValue) || parseFloat(o.price.value) || 0;
                if (!catPrices[cat]) catPrices[cat] = [];
                catPrices[cat].push(price);
            });

            const categories = Object.keys(catPrices).sort();
            const avgData = categories.map(cat => {
                const prices = catPrices[cat];
                return +(prices.reduce((a, b) => a + b, 0) / prices.length).toFixed(2);
            });
            const minData = categories.map(cat => +Math.min(...catPrices[cat]).toFixed(2));
            const maxData = categories.map(cat => +Math.max(...catPrices[cat]).toFixed(2));

            chart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                },
                grid: { left: 10, right: 20, bottom: 10, top: 30, containLabel: true },
                xAxis: {
                    type: 'value',
                    axisLabel: { formatter: '{value} €', color: '#888' },
                    splitLine: { lineStyle: { color: '#222' } },
                },
                yAxis: {
                    type: 'category',
                    data: categories,
                    axisLabel: {
                        color: '#aaa',
                        fontSize: 11,
                        width: 100,
                        overflow: 'truncate',
                    },
                },
                series: [
                    {
                        name: 'Min',
                        type: 'bar',
                        stack: 'range',
                        data: minData,
                        itemStyle: { color: 'transparent' },
                        emphasis: { itemStyle: { color: 'transparent' } },
                    },
                    {
                        name: 'Preisspanne',
                        type: 'bar',
                        stack: 'range',
                        data: categories.map((cat, i) => ({
                            value: +(maxData[i] - minData[i]).toFixed(2),
                            itemStyle: { color: CATEGORY_COLORS[cat] || '#888', opacity: 0.4 },
                        })),
                    },
                    {
                        name: 'Ø Preis',
                        type: 'scatter',
                        data: categories.map((cat, i) => ({
                            value: avgData[i],
                            itemStyle: { color: CATEGORY_COLORS[cat] || '#888' },
                        })),
                        symbolSize: 12,
                        z: 10,
                    },
                ],
            });

            window.addEventListener('resize', () => chart.resize());
        }

        // ── Trend Chart (filtered) ───────────────────────────────
        function renderTrend() {
            const container = document.getElementById('chart-trend');
            if (allTrendData.length === 0) return;

            // Apply time range filter
            const maxWeeks = TIME_RANGES[activeTimeRange].weeks;
            const data = maxWeeks === Infinity
                ? allTrendData
                : allTrendData.slice(-maxWeeks);

            const weeks = data.map(w => w.week);
            const cats = allTrendCategories.filter(c => activeCategories.has(c));

            if (trendChart) trendChart.dispose();
            trendChart = echarts.init(container, 'dark');

            trendChart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' },
                },
                legend: {
                    data: cats,
                    textStyle: { color: '#aaa', fontSize: 11 },
                    bottom: 0,
                    type: 'scroll',
                    selected: Object.fromEntries(cats.map(c => [c, true])),
                },
                grid: { left: 10, right: 20, bottom: 50, top: 30, containLabel: true },
                xAxis: {
                    type: 'category',
                    data: weeks,
                    axisLabel: { color: '#888', rotate: 45 },
                },
                yAxis: {
                    type: 'value',
                    name: 'Produkte',
                    nameTextStyle: { color: '#888' },
                    axisLabel: { color: '#888' },
                    splitLine: { lineStyle: { color: '#222' } },
                },
                series: cats.map(cat => ({
                    name: cat,
                    type: 'line',
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 6,
                    lineStyle: { width: 2, color: CATEGORY_COLORS[cat] || '#888' },
                    itemStyle: { color: CATEGORY_COLORS[cat] || '#888' },
                    areaStyle: { opacity: 0.05 },
                    data: data.map(w => w.counts[cat] || 0),
                })),
            });

            window.addEventListener('resize', () => trendChart.resize());
        }

        // ── Ctrl-to-zoom for network chart ───────────────────
        function setupNetworkZoomGuard() {
            const container = document.getElementById('chart-network');
            const hint = document.getElementById('network-zoom-hint');
            let hintTimeout = null;

            container.addEventListener('wheel', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    const chart = charts.network;
                    if (!chart) return;
                    const zoom = e.deltaY < 0 ? 1.15 : 0.87;
                    chart.dispatchAction({
                        type: 'graphRoam',
                        zoom: zoom,
                    });
                } else {
                    // Show hint overlay briefly
                    hint.classList.add('visible');
                    clearTimeout(hintTimeout);
                    hintTimeout = setTimeout(() => hint.classList.remove('visible'), 1200);
                }
            }, { passive: false });
        }

        const HIDDEN_CATEGORIES_DEFAULT = ['Fleisch & Wurst', 'Drogerie', 'Tiernahrung'];

        init();
    </script>
</body>

</html>
