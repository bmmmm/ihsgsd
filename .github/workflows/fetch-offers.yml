name: Fetch EDEKA Offers

on:
  schedule:
    - cron: "0 5 * * 1" # Runs every Monday at 5 AM GMT+1
  workflow_dispatch: # Allows manual triggering of the workflow

# The built-in GITHUB_TOKEN needs write access to push the fetched data back
# to the repo. This replaces the custom PAT (secrets.ABUFS_AJUN13_TOKEN), which
# expired and broke the pipeline; the built-in token never expires.
permissions:
  contents: write

jobs:
  fetch-and-store:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "24591225+bmmmm@users.noreply.github.com"

      - name: Fetch data from EDEKA API
        id: fetch-data
        run: |
          API_URL="https://www.edeka.de/api/auth-proxy/?path=api%2Foffers%3Flimit%3D999%26marketId%3D5625811"
          RESPONSE=$(curl -s "$API_URL")
          echo "$RESPONSE" > data.json

      - name: Sort JSON by category
        run: |
          RAW_JSON=$(cat data.json)
          SORTED_JSON=$(echo "$RAW_JSON" | jq '.offers |= sort_by(.category.name)')
          echo "$SORTED_JSON" > data.json

      - name: Determine folder and file structure
        id: structure
        run: |
          CURRENT_DATE=$(date -u +"%Y-%m-%d")
          YEAR=$(date -u +"%Y")
          WEEK="KW$(date -u +"%V")"
          FOLDER="data/$YEAR/$WEEK"
          FILE="$CURRENT_DATE.json"
          mkdir -p "$FOLDER" # Create the full folder structure
          mv data.json "$FOLDER/$FILE"
          echo "folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "file=$FOLDER/$FILE" >> $GITHUB_OUTPUT

      - name: Generate folder-structure.json
        id: generate-structure
        run: |
          # Find all JSON files excluding generated index files
          find data -type f -name "*.json" ! -name "folder-structure.json" ! -name "trend-index.json" | sed 's|^data/||' | sort | jq -R -s -c 'split("\n") | map(select(length > 0))' > data/folder-structure.json

      - name: Generate trend-index.json
        id: generate-trend
        run: |
          # Precomputed per-week category counts, replacing the dashboard's
          # 17 MB load-all. One entry per snapshot, sorted by date.
          find data -path 'data/[0-9]*/KW*/*.json' | sort | while read -r f; do
            rel=${f#data/}
            jq -c --arg file "$rel" '{
              file:$file,
              week:($file|capture("(?<y>[0-9]{4})/(?<kw>KW[0-9]+)/")|"\(.y)-\(.kw)"),
              date:($file|capture("(?<d>[0-9]{4}-[0-9]{2}-[0-9]{2})")|.d),
              total:.totalCount,
              counts:(.offers|group_by(.category.name)|map({key:.[0].category.name,value:length})|from_entries)
            }' "$f"
          done | jq -s 'sort_by(.date)' > data/trend-index.json

      - name: Commit and push data
        run: |
          git add data/
          git commit -m "Add data for ${{ steps.structure.outputs.file }} and update folder structure"
          git push
