name: Fetch EDEKA Offers

on:
  schedule:
    - cron: "0 5 * * 1" # Runs every Monday at 05:00 UTC (06:00 CET / 07:00 CEST)
  workflow_dispatch: # Allows manual triggering of the workflow

# The built-in GITHUB_TOKEN needs write access to push the fetched data back
# to the repo. This replaces the custom PAT (secrets.ABUFS_AJUN13_TOKEN), which
# expired and broke the pipeline; the built-in token never expires.
permissions:
  contents: write

concurrency:
  group: fetch-offers
  cancel-in-progress: false

jobs:
  fetch-and-store:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "24591225+bmmmm@users.noreply.github.com"

      - name: Fetch data from EDEKA API
        id: fetch-data
        run: |
          API_URL="https://www.edeka.de/api/auth-proxy/?path=api%2Foffers%3Flimit%3D999%26marketId%3D5625811"
          RESPONSE=$(curl -sf "$API_URL") || { echo "EDEKA API fetch failed (HTTP error or network failure)"; exit 1; }
          echo "$RESPONSE" | jq -e '.offers | type == "array"' >/dev/null || { echo "EDEKA API returned no offers array"; exit 1; }
          echo "$RESPONSE" > data.json

      - name: Sort JSON by category
        run: |
          RAW_JSON=$(cat data.json)
          SORTED_JSON=$(echo "$RAW_JSON" | jq '.offers |= sort_by(.category.name)')
          echo "$SORTED_JSON" > data.json

      - name: Determine folder and file structure
        id: structure
        run: |
          CURRENT_DATE=$(date -u +"%Y-%m-%d")
          YEAR=$(date -u +"%G")
          WEEK="KW$(date -u +"%V")"
          FOLDER="data/$YEAR/$WEEK"
          FILE="$CURRENT_DATE.json"
          mkdir -p "$FOLDER" # Create the full folder structure
          mv data.json "$FOLDER/$FILE"
          echo "folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "file=$FOLDER/$FILE" >> $GITHUB_OUTPUT

      - name: Archive product images
        run: |
          # Download the small `app` thumbnails (~10 KB each) into a sibling
          # img/ dir so they survive EDEKA's ~1-2 month purge of live images.
          # Keyed by offer id; skips already-present files; failures are
          # non-fatal (the frontend falls back to the live URL).
          IMG_DIR="${{ steps.structure.outputs.folder }}/img"
          FILE="${{ steps.structure.outputs.file }}"
          mkdir -p "$IMG_DIR"
          ok=0; fail=0
          while IFS=$'\t' read -r id url; do
            [ -n "$url" ] || continue
            out="$IMG_DIR/${id}.jpg"
            [ -f "$out" ] && continue
            if curl -sf --max-time 30 -o "$out" "$url"; then
              ok=$((ok + 1))
            else
              rm -f "$out"; fail=$((fail + 1))
              echo "WARN: could not fetch image for offer $id ($url)"
            fi
          done < <(jq -r '.offers[] | "\(.id)\t\(.images.app // "")"' "$FILE")
          echo "Archived $ok image(s), $fail failure(s) into $IMG_DIR"

      - name: Generate folder-structure.json
        id: generate-structure
        run: |
          # Find all JSON files excluding generated index files
          find data -type f -name "*.json" ! -name "folder-structure.json" ! -name "trend-index.json" ! -name "price-history-index.json" | sed 's|^data/||' | sort | jq -R -s -c 'split("\n") | map(select(length > 0))' > data/folder-structure.json

      - name: Generate index files (trend + price history)
        id: generate-indexes
        run: |
          # One Python pass over all snapshots produces both precomputed indexes
          # the dashboard loads instead of the ~17 MB of weekly JSON:
          #   - trend-index.json         per-week category counts + KPIs
          #   - price-history-index.json per-product Grundpreis (€/unit) series
          # stdlib only; python3 is preinstalled on ubuntu-latest.
          python3 scripts/build_indexes.py

      - name: Commit and push data
        run: |
          git add data/
          git diff --staged --quiet && echo "Nothing to commit, skipping" && exit 0
          git commit -m "Add data for ${{ steps.structure.outputs.file }} and update folder structure"
          git push
