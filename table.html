<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>EDEKA Angebote — Tabelle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #121212;
            color: #e0e0e0;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 10px;
        }

        /* Controls layout */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            width: 100%;
        }

        #search-input {
            flex: 0 0 220px;
        }

        /* Category checkboxes */
        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }

        .category-filters label {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: #2a2a2a;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            border: 1px solid #444;
            user-select: none;
        }

        .category-filters label:hover {
            background-color: #3a3a3a;
        }

        .category-filters label.checked {
            background-color: #1a472a;
            border-color: #2d7a4a;
        }

        .category-filters input[type="checkbox"] {
            accent-color: #4caf50;
            cursor: pointer;
        }

        .hidden-categories {
            margin-top: 0;
            padding-top: 4px;
            border-top: 1px solid #333;
        }

        .hidden-categories::before {
            content: "Ausgeblendet:";
            font-size: 11px;
            color: #666;
            margin-right: 4px;
            align-self: center;
        }

        .hidden-categories label {
            opacity: 0.5;
        }

        .hidden-categories label.checked {
            opacity: 1;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #1e1e1e;
            color: #e0e0e0;
            table-layout: fixed;
        }

        th,
        td {
            border: 1px solid #333;
            padding: 5px;
            text-align: left;
            word-break: break-word;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        th {
            background-color: #252525;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Column widths */
        col.col-produkt { width: 24%; }
        col.col-kategorie { width: 12%; }
        col.col-preis { width: 8%; }
        col.col-grundpreis { width: 13%; }
        col.col-beschreibung { width: 31%; }
        col.col-bild { width: 12%; }

        /* Sortable headers */
        th.sortable {
            cursor: pointer;
            user-select: none;
        }

        th.sortable:hover {
            background-color: #2e2e2e;
        }

        th.sortable::after {
            content: '↕';
            margin-left: 6px;
            color: #666;
            font-size: 0.8em;
        }

        th.sortable.sorted-asc::after { content: '▲'; color: #4caf50; }
        th.sortable.sorted-desc::after { content: '▼'; color: #4caf50; }

        /* PAYBACK / App-Preis markers reuse the knuller-badge shape */
        .knuller-badge.payback-badge {
            background: #0f2a4a;
            color: #64b5f6;
            border-color: #64b5f644;
        }

        .knuller-badge.app-badge {
            background: #3a2f12;
            color: #ffd54f;
            border-color: #ffd54f44;
        }

        /* Superknüller marker on the product cell */
        .knuller-badge {
            display: inline-block;
            background: #3a1220;
            color: #ff3b6b;
            border: 1px solid #ff3b6b44;
            border-radius: 999px;
            padding: 0 7px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 6px;
            vertical-align: middle;
            white-space: nowrap;
        }

        .hidden {
            display: none;
        }

        /* Image preview (hover) */
        .image-preview {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 350px;
            height: 350px;
            border: 2px solid #444;
            background-color: #1e1e1e;
            padding: 10px;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: none;
            pointer-events: none;
        }

        .image-preview.visible {
            display: block;
        }

        .image-preview img {
            width: 100%;
            height: auto;
            max-height: 100%;
        }

        /* Form elements */
        button,
        select,
        input[type="text"] {
            background-color: #333333;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover,
        select:hover,
        input[type="text"]:hover {
            background-color: #444;
        }

        button:active {
            background-color: #555;
        }

        /* Dropdown row */
        .file-select-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        #offer-info {
            color: #aaa;
            margin: 5px 0 10px 0;
        }

        /* Table images */
        td img {
            cursor: zoom-in;
            max-width: 80px;
            max-height: 60px;
            height: auto;
            width: auto;
        }

        td.image-cell {
            text-align: center;
            vertical-align: middle;
        }

        /* Alternating row colors */
        #offer-table tr:nth-child(even) {
            background-color: #252525;
        }

        #offer-table tr:hover {
            background-color: #333;
        }

        /* Rows open the product detail card on click */
        #offer-table tr {
            cursor: pointer;
        }

        /* Mobile layout: table rows become stacked cards with data-label
           columns instead of the fixed-width desktop grid. Desktop (above
           the breakpoint) is untouched. */
        @media (max-width: 700px) {
            #search-input {
                flex: 1 1 100%;
            }

            button,
            select,
            input[type="text"] {
                padding: 10px 14px;
                font-size: 15px;
                min-height: 44px;
            }

            .category-filters label {
                padding: 8px 12px;
                min-height: 44px;
                box-sizing: border-box;
                font-size: 14px;
            }

            .file-select-row select {
                flex: 1 1 auto;
            }

            colgroup {
                display: none;
            }

            table {
                table-layout: auto;
            }

            /* Header becomes a wrapping strip of sort buttons; the two
               non-sortable columns (Beschreibung, Bild) have no card-grid
               to align to, so they're dropped from the header entirely. */
            thead tr {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                position: sticky;
                top: 0;
                background-color: #252525;
                padding: 6px;
                border: 1px solid #333;
                border-radius: 6px;
            }

            thead th {
                display: flex;
                align-items: center;
                border: 1px solid #444;
                border-radius: 4px;
                background-color: #2a2a2a;
                padding: 8px 10px;
                min-height: 44px;
                box-sizing: border-box;
            }

            th:not(.sortable) {
                display: none;
            }

            tbody,
            tr {
                display: block;
            }

            #offer-table tr,
            #offer-table tr:nth-child(even) {
                background-color: #1e1e1e;
                border: 1px solid #333;
                border-radius: 8px;
                padding: 4px 10px;
                margin-top: 10px;
            }

            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                border: none;
                border-bottom: 1px solid #2a2a2a;
                padding: 8px 2px;
                text-align: right;
                white-space: normal;
            }

            td:last-child {
                border-bottom: none;
            }

            td::before {
                content: attr(data-label);
                color: #888;
                font-weight: bold;
                text-align: left;
                flex-shrink: 0;
            }

            /* Product title acts as the card heading, not a labeled row. */
            td:first-child {
                justify-content: flex-start;
                font-weight: bold;
                font-size: 1.05rem;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
                margin-bottom: 4px;
            }

            td:first-child::before {
                display: none;
            }

            td.image-cell {
                justify-content: flex-end;
            }
        }

        /* Hover preview only makes sense on devices that actually support
           hover (mouse/trackpad) — on touch, tapping a row opens the detail
           card instead, so the preview panel never gets populated (see
           attachImageHoverPreview() in script.js) and is hidden here too. */
        @media (hover: none) {
            .image-preview {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:10px;">
        <h1 id="page-title" style="margin:0;">EDEKA Wochenangebote</h1>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <a href="prospekt.html" style="color:#888; text-decoration:none; padding:8px 16px; border:1px solid #333; border-radius:8px; font-size:0.95rem; transition:all 0.2s;"
               onmouseover="this.style.color='#fff'; this.style.borderColor='#555'; this.style.background='#1a1a1a'"
               onmouseout="this.style.color='#888'; this.style.borderColor='#333'; this.style.background='transparent'">Prospekt</a>
            <a href="dashboard.html" style="color:#888; text-decoration:none; padding:8px 16px; border:1px solid #333; border-radius:8px; font-size:0.95rem; transition:all 0.2s;"
               onmouseover="this.style.color='#fff'; this.style.borderColor='#555'; this.style.background='#1a1a1a'"
               onmouseout="this.style.color='#888'; this.style.borderColor='#333'; this.style.background='transparent'">Dashboard</a>
            <a href="index.html" style="color:#888; text-decoration:none; padding:8px 16px; border:1px solid #333; border-radius:8px; font-size:0.95rem; transition:all 0.2s;"
               onmouseover="this.style.color='#fff'; this.style.borderColor='#555'; this.style.background='#1a1a1a'"
               onmouseout="this.style.color='#888'; this.style.borderColor='#333'; this.style.background='transparent'">&#8592; Startseite</a>
        </div>
    </div>

    <div class="file-select-row">
        <label for="file-dropdown">Woche:</label>
        <select id="file-dropdown"></select>
    </div>
    <p id="offer-info">Lade aktuelle Informationen...</p>

    <div class="controls">
        <div class="controls-row">
            <input id="search-input" type="text" placeholder="Suchen..." />
            <button id="toggle-images" aria-label="Bilder anzeigen oder ausblenden">Bilder laden</button>
            <button id="copy-products" aria-label="Sichtbare Produkte kopieren">Produkte kopieren</button>
        </div>
        <div id="category-filters" class="category-filters"></div>
        <div id="hidden-category-filters" class="category-filters hidden-categories"></div>
    </div>

    <table>
        <colgroup>
            <col class="col-produkt">
            <col class="col-kategorie">
            <col class="col-preis">
            <col class="col-grundpreis">
            <col class="col-beschreibung">
            <col class="col-bild">
        </colgroup>
        <thead>
            <tr>
                <th scope="col" class="sortable" data-sort="title">Produkt</th>
                <th scope="col" class="sortable" data-sort="category">Kategorie</th>
                <th scope="col" class="sortable" data-sort="price">Preis</th>
                <th scope="col" class="sortable" data-sort="gp">Grundpreis</th>
                <th scope="col">Beschreibung</th>
                <th scope="col" id="image-column-header" class="hidden">Bild</th>
            </tr>
        </thead>
        <tbody id="offer-table"></tbody>
    </table>

    <div id="image-preview" class="image-preview"></div>

    <script src="detail-card.js"></script>
    <script src="script.js"></script>
</body>

</html>
